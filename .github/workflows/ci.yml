name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v --asyncio-mode=auto --tb=short

  validate-notebooks:
    name: Validate Notebooks
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Execute notebooks (offline mode)
        env:
          NOTEBOOK_OFFLINE_MODE: "true"
        run: |
          for nb in notebooks/**/*.ipynb; do
            echo "Executing: $nb"
            jupyter nbconvert \
              --to notebook \
              --execute "$nb" \
              --output /tmp/output.ipynb \
              --ExecutePreprocessor.timeout=120 \
              || echo "[INFO] Skipped $nb (requires Azure credentials)"
          done
          echo "Notebook validation complete."
